<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="5" fill="#096fb3"/>
  <!--
    Andritz "A": slanted letterform with triangular white cutout.
    The A leans slightly right (italic style). Wide seriffed legs at bottom.
    Left leg: outer left edge goes from bottom-left up to apex (top-right of peak).
    Right leg: comes down from apex to bottom-right.
    Crossbar notch: the white triangle cut inside the A.
  -->
  <!-- Full A shape in white -->
  <path d="M5,28 L13.5,4 L19,4 L27,28 L22,28 L16.5,12 L14.5,12 L9,28 Z" fill="white"/>
  <!-- Knock out the inner triangle (crossbar void) using navy -->
  <path d="M13.5,4 L19,4 L16.5,12 L14.5,12 Z" fill="#096fb3"/>
</svg>
