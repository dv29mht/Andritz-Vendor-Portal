<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="13" fill="#1c8cd4"/>
  <!--
    Andritz "A": large white triangular letterform with an inverted-triangle
    notch near the top and a thin vertical slit dropping from the notch.
    fill-rule="evenodd" lets a single path describe outer triangle + cutouts.
  -->
  <path fill="white" fill-rule="evenodd"
        d="M32 10 L10 54 L54 54 Z
           M32 26 L24 42 L40 42 Z
           M31 42 L31 54 L33 54 L33 42 Z"/>
</svg>
